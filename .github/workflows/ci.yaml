name: CI - Config repo
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  checkov-scan:
      name: Checkov — manifest security scan
      runs-on: ubuntu-latest
      permissions:
        contents: read
        security-events: write
      steps:
        - uses: actions/checkout@v4

        - name: Install Helm
          uses: azure/setup-helm@v3

        - name: Install Checkov
          run: pip install checkov

        - name: Render Helm templates
          run: helm template flask-release ./flask-app > rendered.yaml

        - name: Create output-Checkov directory
          run: mkdir -p ./checkov-results

        - name: Run Checkov
          run: |
            checkov -f rendered.yaml \
              --framework kubernetes \
              --soft-fail-on MEDIUM \
              --hard-fail-on HIGH,CRITICAL \
              --output sarif \
              --output-file-path ./checkov-results/checkov.sarif
            
        - name: Enrich SARIF with severity
          run: python3 .github/scripts/enrich_sarif.py ./checkov-results/checkov.sarif

        - name: Upload SARIF to GitHub Security
          uses: github/codeql-action/upload-sarif@v4
          if: always()
          with:
            sarif_file: ./checkov-results/checkov.sarif

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: checkov-report
            path: ./checkov-results/